apiVersion: v1
kind: Namespace
metadata:
  name: java
  labels:
    app: java-example
    monitoring: enabled
---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: java
  name: java-example
  labels:
    app: java-example
spec:
  replicas: 1
  selector:
    matchLabels:
      app: java-example
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: java-example
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      containers:
      - image: tkgregory/sample-metrics-application:latest
        imagePullPolicy: Always
        name: java-example
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  namespace: java
  name: java-service
  labels:
    app: java-example
spec:
  selector:
    app: java-example
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP