apiVersion: v1
kind: ServiceAccount
metadata:
  name: aws-load-balancer-controller
  namespace: kube-system
  labels:
    app.kubernetes.io/component: controller
    app.kubernetes.io/name: aws-load-balancer-controller
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::account-id:role/role-name" # Replace with your IRSA role ARN created by eksctl or AWS CLI or directly in AWS console

---

apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: gp3
  annotations:
    storageclass.kubernetes.io/is-default-class: "false"
provisioner: ebs.csi.aws.com
parameters:
  type: gp3
  fsType: ext4
  encrypted: "true"       
reclaimPolicy: Retain                        # Production: Retain data even if PVC is deleted
allowVolumeExpansion: true
volumeBindingMode: WaitForFirstConsumer      # Critical: binds PVC only after pod is scheduled

---

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: monitoring-ingress
  namespace: java
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/subnets: "subnet-xxxxx,subnet-yyyyy" # Your public subnets (2 AZs minimum)
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS": 443}, {"HTTP": 80}]'
    alb.ingress.kubernetes.io/actions.ssl-redirect: '{"Type": "redirect", "RedirectConfig": {"Protocol": "HTTPS", "Port": "443", "StatusCode": "HTTP_301"}}'
    alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:us-east-1:account-id:certificate/cert-id" # ACM wildcard cert
    alb.ingress.kubernetes.io/security-groups: "sg-xxxxx" # ALB security group (allow 80/443 inbound)
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "30"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"
    alb.ingress.kubernetes.io/group.name: java-monitoring  # All ingresses share ONE ALB or get their own ALB per group (costly but clean)
    alb.ingress.kubernetes.io/tags: Environment=Production,Project=Java-Monitoring
    alb.ingress.kubernetes.io/load-balancer-attributes: >-
      idle_timeout.timeout_seconds=60,
      routing.http.drop_invalid_header_fields.enabled=true
  labels:
    app: monitoring

spec:
  ingressClassName: alb
  rules:
    # Java Application
    - host: app.example.com                    # Replace with your FQDN
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: java-service               # Replace with your Java app service name
                port:
                  number: 80

    # Grafana
    - host: grafana.example.com                # Replace with your FQDN
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prometheus-grafana      # Replace with your Grafana service name (e.g., prometheus-grafana)
                port:
                  number: 80

    # Prometheus
    - host: prometheus.example.com             # Replace with your FQDN
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prometheus-prometheus      # Replace with your Prometheus service name (e.g., prometheus-server)
                port:
                  number: 9090

    # Alertmanager
    - host: alertmanager.example.com           # Replace with your FQDN
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prometheus-alertmanager      # Replace with your Alertmanager service name (e.g., prometheus-alertmanager)
                port:
                  number: 9093

